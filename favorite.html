<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VibeSync — Favorites</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base:       #0a0a0f;
  --bg-surface:    #11111c;
  --bg-card:       #17172a;
  --bg-hover:      #1e1e35;
  --purple-deep:   #2d1f5e;
  --purple-mid:    #4a2f8a;
  --purple-accent: #7c4dcc;
  --purple-bright: #9b6de0;
  --purple-glow:   rgba(124,77,204,0.25);
  --pink-accent:   #b06ab3;
  --text-primary:  #e8e0f5;
  --text-secondary:#9e8fc0;
  --text-muted:    #5c5480;
  --border:        rgba(124,77,204,0.18);
  --border-hover:  rgba(124,77,204,0.45);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: var(--bg-base); color: var(--text-primary); overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: linear-gradient(180deg, #0e0e1a 0%, #0a0a14 100%);
  border-right: 1px solid var(--border);
  padding: 24px 16px;
  position: fixed;
  height: 100vh;
  overflow-y: auto;
  scrollbar-width: none;
  z-index: 50;
}
.sidebar::-webkit-scrollbar { display: none; }
.sidebar h2 {
  font-size: 26px; font-weight: 700; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #9b6de0, #b06ab3);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 28px; padding-left: 6px;
}
.sidebar ul { list-style: none; }
.sidebar li {
  padding: 9px 12px; border-radius: 10px; margin: 3px 0;
  cursor: pointer; font-size: 14px; color: var(--text-secondary);
  transition: 0.2s; display: flex; align-items: center; gap: 8px;
}
.sidebar li:hover { background: var(--bg-hover); color: var(--text-primary); }
.sidebar li.active {
  background: linear-gradient(90deg, rgba(124,77,204,0.25), rgba(176,106,179,0.1));
  color: var(--purple-bright);
  border-left: 2px solid var(--purple-accent);
  padding-left: 10px;
}
.section-title {
  font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-muted); padding: 18px 12px 6px;
}

/* MAIN */
.main {
  margin-left: 220px;
  padding: 28px 32px 100px;
  height: 100vh;
  width: calc(100vw - 220px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--purple-deep) transparent;
}
.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-thumb { background: var(--purple-deep); border-radius: 4px; }

/* PAGE HEADER */
.page-header { margin-bottom: 32px; }
.page-header h1 { font-size: 32px; font-weight: 700; color: var(--text-primary); }
.page-header p { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

/* SECTION */
.section { margin-bottom: 48px; }
.section-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
}
.section-icon {
  width: 42px; height: 42px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; font-size: 24px;
  background: linear-gradient(135deg, rgba(124,77,204,0.3), rgba(176,106,179,0.15));
  border: 1px solid var(--border);
}
.section-header h2 { font-size: 20px; font-weight: 600; color: var(--text-primary); }
.section-header .count { font-size: 12px; color: var(--text-muted); margin-left: auto; }

/* ── SONGS TABLE — Spotify style, full width ── */
.songs-list { width: 100%; }

.songs-header,
.song-item {
  display: grid;
  /* # | thumbnail+title+artist (flex) | duration | remove */
  grid-template-columns: 40px 1fr 80px 40px;
  align-items: center;
  gap: 16px;
  padding: 0 12px;
  width: 100%;
}

.songs-header {
  height: 36px;
  font-size: 11px; font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.1em;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}

.song-item {
  height: 56px;
  cursor: pointer;
  border-radius: 4px;
  transition: background 0.15s;
}
.song-item:hover { background: var(--bg-hover); }

.song-num {
  font-size: 13px; color: var(--text-muted);
  text-align: center; font-weight: 500;
}

/* thumbnail + title + artist stacked */
.song-meta {
  display: flex; align-items: center; gap: 12px;
  min-width: 0; /* let it shrink */
}
.song-thumbnail {
  width: 40px; height: 40px;
  border-radius: 4px; object-fit: cover;
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.song-text { min-width: 0; }
.song-text h3 {
  font-size: 14px; font-weight: 600; color: var(--text-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin: 0 0 2px;
}
.song-text p {
  font-size: 12px; color: var(--text-secondary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0;
}

.song-duration {
  font-size: 12px; color: var(--text-muted); text-align: right;
}

/* ARTISTS LIST */
.artists-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 16px;
}
.artist-card {
  display: flex; flex-direction: column; align-items: center;
  padding: 16px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: 14px;
  cursor: pointer; transition: 0.3s; text-align: center;
}
.artist-card:hover {
  background: var(--bg-hover); border-color: var(--border-hover);
  transform: translateY(-6px);
}
.artist-image {
  width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
  border: 2px solid var(--border); margin-bottom: 12px; transition: 0.3s;
}
.artist-card:hover .artist-image {
  border-color: var(--purple-accent); box-shadow: 0 0 20px var(--purple-glow);
}
.artist-card h3 { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.artist-card p { font-size: 11px; color: var(--text-secondary); margin-bottom: 12px; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
.empty-state-icon { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 14px; margin-bottom: 8px; }

/* PLAYER */
.player {
  position: fixed; bottom: 0; left: 0; right: 0; height: 72px;
  background: rgba(11,11,20,0.92); backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 0 28px; display: flex; align-items: center;
  justify-content: space-between; gap: 24px; z-index: 100;
}
.player-track { display: flex; align-items: center; gap: 12px; min-width: 200px; }
.player-track-thumb {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--bg-card); border: 1px solid var(--border);
  overflow: hidden; flex-shrink: 0;
}
.player-track-thumb img { width: 100%; height: 100%; object-fit: cover; }
.player-track-info h5 { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.player-track-info p { font-size: 11px; color: var(--text-secondary); }
.controls { display: flex; align-items: center; flex-direction: column; gap: 8px; flex: 1; max-width: 460px; }
.ctrl-btns { display: flex; align-items: center; gap: 10px; }
.ctrl-btns button {
  background: none; border: none; cursor: pointer; padding: 6px;
  border-radius: 50%; color: var(--text-secondary); transition: 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.ctrl-btns button:hover { color: var(--text-primary); background: var(--bg-hover); }
.ctrl-btns .play-main {
  background: linear-gradient(135deg, var(--purple-accent), var(--pink-accent));
  color: #fff; width: 38px; height: 38px; box-shadow: 0 0 16px var(--purple-glow);
}
.ctrl-btns .play-main:hover { transform: scale(1.08); }

@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.fade-in { animation: fadeIn 0.5s ease forwards; }
@keyframes slideIn { from { transform:translateX(400px); opacity:0; } to { transform:translateX(0); opacity:1; } }
@keyframes slideOut { from { transform:translateX(0); opacity:1; } to { transform:translateX(400px); opacity:0; } }
</style>
</head>
<body>
<div style="display:flex;height:100vh;overflow:hidden">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>VibeSync</h2>
  <ul>
    <li onclick="location.href='index.html'">🏠 Home</li>
    <li onclick="location.href='explore.html'">🔍 Explore</li>
  </ul>
  <ul>
    
    
  </ul>
  <ul>
    <li class="active" onclick="location.href='favorite.html'">❤️ Favorites</li>
  </ul>
  <ul>
    <li onclick="location.href='aboutus.html'">ⓘ About Us</li>
        </ul>
  <ul>
          <li onclick="location.href='contact.html'">📞 Contact Us</li>
        </ul>
  
</div>

<!-- MAIN -->
<div class="main">
  <div class="page-header fade-in">
    <h1>❤️ Favourites</h1>
    <p>Your collection of loved songs and artists</p>
  </div>

  <!-- SONGS SECTION -->
  <div class="section fade-in" style="animation-delay:0.1s">
    <div class="section-header">
      <div class="section-icon">🎵</div>
      <h2>Favorite Songs</h2>
      <span class="count" id="songsCount">0 songs</span>
    </div>
    <div id="songsContainer" class="songs-list"></div>
  </div>

  <!-- ARTISTS SECTION -->
  <div class="section fade-in" style="animation-delay:0.2s">
    <div class="section-header">
      <div class="section-icon">🎤</div>
      <h2>Favorite Artists</h2>
      <span class="count" id="artistsCount">0 artists</span>
    </div>
    <div id="artistsContainer" class="artists-list"></div>
  </div>
</div>

</div><!-- /flex -->

<!-- PLAYER -->
<div class="player">
  <div class="player-track">
    <div class="player-track-thumb"><img id="playerThumb" src="https://picsum.photos/44/44?1" alt=""></div>
    <div class="player-track-info">
      <h5 id="playerTitle">Select a song</h5>
      <p id="playerArtist">—</p>
    </div>
  </div>
  <div class="controls">
    <div class="ctrl-btns">
      <button><svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zm4.41-1.17h2l-3.5-3.5-1.41 1.41L13.17 8H15zm0 8h-2l-6.5-6.5-1.41 1.41L7 13h-2l3.5 3.5 1.41-1.41L8.83 14H10l6.5 6.5 1.41-1.41L15 16zm1.41-8L19 5.41 17.59 4l-5.17 5.17 1.41 1.41L15 8.41l1 1.59h-1z"/></svg></button>
      <button><svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
      <button class="play-main" id="playBtn" onclick="togglePlay()">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button><svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg></button>
      <button><svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
    </div>
  </div>
</div>

<script>
var FAVORITE_SONGS = [
  { id:1, title:'Tum Hi Ho',        artist:'Arijit Singh',  duration:'4:22', thumbnail:'https://i.scdn.co/image/ab67616d0000b273c7d8e8ab8d93f1a6a3c4d6f1' },
  { id:2, title:'Blinding Lights',  artist:'The Weeknd',    duration:'3:20', thumbnail:'https://picsum.photos/52/52?91' },
  { id:3, title:'Birds Of A Feather',artist:'Billie Eilish',duration:'3:30', thumbnail:'https://i1.sndcdn.com/artworks-lW0bAqSwcL9sMV37-tC9gVQ-t1080x1080.jpg' },
  { id:4, title:'Numb',             artist:'Linkin Park',   duration:'3:05', thumbnail:'https://picsum.photos/52/52?111' },
  { id:5, title:'Dealer',           artist:'Diljit Dosanjh',duration:'3:32', thumbnail:'https://i1.sndcdn.com/artworks-pixZO0zCcDni0niG-otFiyA-t500x500.jpg' },
  { id:6, title:'Kesariya',         artist:'Arijit Singh',  duration:'4:28', thumbnail:'https://i.scdn.co/image/ab67616d0000b273b8e7a6c9f3c9b3e1a2d4f5e0' }
];

var FAVORITE_ARTISTS = [
  { id:1, name:'Arijit Singh',  genre:'Bollywood', image:'https://i.scdn.co/image/ab6761610000e5eb4293385d324db8558179afd9', followers:'5.2M' },
  { id:2, name:'Billie Eilish', genre:'Pop',       image:'https://i.scdn.co/image/ab6761610000e5ebd8b9980db67272cb4d2c3a44', followers:'8.1M' },
  { id:3, name:'The Weeknd',    genre:'Pop',       image:'https://i.scdn.co/image/ab6761610000e5eb214f3cf1cbe7139c1e26ffbb', followers:'9.3M' },
  { id:4, name:'Linkin Park',   genre:'Rock',      image:'https://i.scdn.co/image/ab6761610000e5eba9c2bb1a4e5db0c6a1b2c3d4', followers:'7.8M' },
  { id:5, name:'Diljit Dosanjh',genre:'Punjabi',   image:'https://i.scdn.co/image/ab6761610000e5eb5f6a7b8c9d0e1f2a3b4c5d6e', followers:'4.5M' },
  { id:6, name:'Coldplay',      genre:'Rock',      image:'https://i.scdn.co/image/ab6761610000e5eb989ed05e1f0570cc4726c2d3', followers:'6.9M' }
];

var favoriteSongs   = FAVORITE_SONGS.slice();
var favoriteArtists = FAVORITE_ARTISTS.slice();
var currentSong = null;
var isPlaying   = false;

function renderSongs() {
  var container = document.getElementById('songsContainer');
  var countEl   = document.getElementById('songsCount');

  if (favoriteSongs.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎵</div><p>No favorite songs yet</p></div>';
    countEl.textContent = '0 songs';
    return;
  }

  countEl.textContent = favoriteSongs.length + ' song' + (favoriteSongs.length !== 1 ? 's' : '');

  var html = '<div class="songs-header"><div>#</div><div>Song</div><div style="text-align:right">Duration</div><div></div></div>';

  for (var i = 0; i < favoriteSongs.length; i++) {
    var s = favoriteSongs[i];
    html += '<div class="song-item" data-idx="' + i + '">' +
      '<div class="song-num">' + (i + 1) + '</div>' +
      '<div class="song-meta">' +
        '<img class="song-thumbnail" src="' + s.thumbnail + '" alt="' + s.title + '" onerror="this.src=\'https://picsum.photos/40/40?' + i + '\'">' +
        '<div class="song-text"><h3>' + s.title + '</h3><p>' + s.artist + '</p></div>' +
      '</div>' +
      '<div class="song-duration">' + s.duration + '</div>' +
    '</div>';
  }

  container.innerHTML = html;

  // attach events
  var items = container.querySelectorAll('.song-item');
  for (var j = 0; j < items.length; j++) {
    items[j].addEventListener('click', function(e) {
      playSong(parseInt(this.dataset.idx));
    });
  }
}

function renderArtists() {
  var container = document.getElementById('artistsContainer');
  var countEl   = document.getElementById('artistsCount');

  if (favoriteArtists.length === 0) {
    container.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">🎤</div><p>No favorite artists yet</p></div>';
    countEl.textContent = '0 artists';
    return;
  }

  countEl.textContent = favoriteArtists.length + ' artist' + (favoriteArtists.length !== 1 ? 's' : '');

  var html = '';
  for (var i = 0; i < favoriteArtists.length; i++) {
    var a = favoriteArtists[i];
    html += '<div class="artist-card fade-in" style="animation-delay:' + (i * 0.05) + 's">' +
      '<img class="artist-image" src="' + a.image + '" alt="' + a.name + '" onerror="this.src=\'https://picsum.photos/80/80?' + i + '\'">' +
      '<h3>' + a.name + '</h3>' +
      '<p>' + a.genre + '</p>' +
      '<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">' + a.followers + '</div>' +
    '</div>';
  }
  container.innerHTML = html;
}

function playSong(idx) {
  var song = favoriteSongs[idx];
  document.getElementById('playerTitle').textContent = song.title;
  document.getElementById('playerArtist').textContent = song.artist;
  document.getElementById('playerThumb').src = song.thumbnail;
  currentSong = song;
  isPlaying = true;
  document.getElementById('playIcon').innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
}

function togglePlay() {
  if (!currentSong) { if (favoriteSongs.length > 0) playSong(0); return; }
  isPlaying = !isPlaying;
  document.getElementById('playIcon').innerHTML = isPlaying
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

renderSongs();
renderArtists();
</script>
</body>
</html>
